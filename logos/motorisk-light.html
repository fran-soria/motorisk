<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100vh;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 0.1em;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 20vw;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #111113;
  }
  .brand svg {
    width: 0.72em;
    height: 0.72em;
    flex-shrink: 0;
  }
  @keyframes spin {
    from { transform: translateY(10%) rotate(0deg); }
    to   { transform: translateY(10%) rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="brand">
    motorisk
    <svg viewBox="4.5 4.5 15 15" fill="none" stroke="#ff453a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 8s linear infinite;">
      <path d="M12 6v12"/><path d="M17.196 9 6.804 15"/><path d="M6.804 9 17.196 15"/>
    </svg>
  </div>
</body>
</html>
